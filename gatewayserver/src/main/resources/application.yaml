server:
  port: 8888
spring:
  application:
    name: gatewayserver
  rabbitmq:
    host: "localhost"
    port: 5672
    username: "guest"
    password: "guest"
  cloud:
    config:
      enabled: false
    discovery:
      enabled: true
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          routes:
            - id: department
              uri: lb://DEPARTMENT
              predicates:
                - Path=/api/departments/**
            - id: teacher
              uri: lb://TEACHER
              predicates:
                - Path=/api/teachers/**

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone:  ${DISCOVERY_SERVICE_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    gateway:
      access: unrestricted
