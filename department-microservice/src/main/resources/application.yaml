server:
  port: 8080
spring:
  profiles:
    active: "prod"

  config:
    import: optional:configserver:${CONFIG_SERVICE_URL:http://localhost:9999}

  application:
    name: department
  datasource:
    url: 'jdbc:h2:mem:depdb'
  h2:
    console:
      enabled: true
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  cloud:
    config:
      enabled: true
    discovery:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone:  ${DISCOVERY_SERVICE_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: '*'

build:
  version : 1.0

author:
  name: "issam el atlati"
  email: "issam@yahoo.com"